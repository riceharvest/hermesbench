<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="description" content="HermesBench is a mobile-first, execution-based benchmark for Hermes-style tool-using agents.">
  <title>HermesBench — execution evidence over benchmark theater</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root{
      color-scheme:dark;
      --bg:#08090a;--bg2:#0b0c0f;--panel:#0f1012;--panel2:#14161a;--card:rgba(255,255,255,.035);--card2:rgba(255,255,255,.055);
      --text:#f7f8f8;--muted:#a0a7b2;--muted2:#62666d;--line:rgba(255,255,255,.08);--line2:rgba(255,255,255,.05);
      --accent:#7170ff;--accent2:#5e6ad2;--good:#10b981;--warn:#f59e0b;--bad:#ef4444;--mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;--sans:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
      --max:1180px;--r:22px;--rs:14px;--shadow:0 20px 80px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.035);
    }
    *{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:radial-gradient(circle at 18% -5%,rgba(113,112,255,.18),transparent 34rem),radial-gradient(circle at 100% 18%,rgba(16,185,129,.10),transparent 28rem),linear-gradient(180deg,var(--bg),#050506 70%);color:var(--text);font-family:var(--sans);font-feature-settings:"cv01","ss03";line-height:1.55;-webkit-font-smoothing:antialiased}a{color:inherit;text-decoration:none}button,input,select{font:inherit}main{max-width:var(--max);margin:0 auto;padding:18px 16px 104px}.topbar{position:sticky;top:0;z-index:50;background:rgba(8,9,10,.78);backdrop-filter:blur(18px);border-bottom:1px solid var(--line2)}.nav{max-width:var(--max);margin:auto;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}.brand{display:flex;align-items:center;gap:10px;font-weight:510;letter-spacing:-.03em}.mark{width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,#7170ff,#10b981);box-shadow:0 0 32px rgba(113,112,255,.35)}.navlinks{display:none;gap:4px}.navlinks a{color:var(--muted);font-size:13px;font-weight:510;padding:9px 10px;border-radius:999px}.navlinks a.active,.navlinks a:hover{color:var(--text);background:rgba(255,255,255,.055)}.github{min-height:40px;padding:0 13px;border:1px solid var(--line);border-radius:999px;color:var(--muted);display:flex;align-items:center;font-size:13px;background:rgba(255,255,255,.025)}.bottomnav{position:fixed;z-index:60;left:10px;right:10px;bottom:10px;display:grid;grid-template-columns:repeat(5,1fr);gap:4px;padding:6px;border:1px solid var(--line);border-radius:22px;background:rgba(15,16,18,.9);backdrop-filter:blur(18px);box-shadow:var(--shadow)}.bottomnav a{min-height:48px;border-radius:16px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px;font-weight:510}.bottomnav a.active{background:rgba(113,112,255,.16);color:var(--text);box-shadow:inset 0 0 0 1px rgba(113,112,255,.25)}.hero{padding:34px 0 26px}.eyebrow,.pill{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line);background:rgba(255,255,255,.035);color:#dfe2ff;border-radius:999px;padding:7px 10px;font-size:11px;font-weight:510;text-transform:uppercase;letter-spacing:.08em}.dot{width:7px;height:7px;border-radius:999px;background:var(--good);box-shadow:0 0 18px var(--good)}h1,h2,h3{letter-spacing:-.045em;line-height:1.02;margin:0}h1{font-size:clamp(40px,13vw,76px);font-weight:510;margin:18px 0 14px}h2{font-size:clamp(28px,8vw,48px);font-weight:510}h3{font-size:18px;font-weight:590;letter-spacing:-.025em}.lead{font-size:18px;color:var(--muted);max-width:760px;margin:0 0 22px}.actions{display:grid;grid-template-columns:1fr;gap:10px}.btn{min-height:52px;border:1px solid var(--line);border-radius:16px;padding:0 16px;display:flex;align-items:center;justify-content:center;font-weight:590;background:rgba(255,255,255,.035);color:var(--text)}.btn.primary{background:var(--accent2);border-color:#828fff;box-shadow:0 14px 40px rgba(94,106,210,.28)}.grid{display:grid;gap:12px}.stats{grid-template-columns:repeat(2,1fr);margin:24px 0}.stat,.card,.result-card,.task-card,.metric{border:1px solid var(--line);background:var(--card);border-radius:var(--r);box-shadow:var(--shadow)}.stat{padding:16px}.stat b{display:block;font-size:25px;letter-spacing:-.05em}.stat span,.small,.muted{color:var(--muted);font-size:13px}.section{padding:34px 0}.section-head{display:grid;gap:10px;margin-bottom:14px}.card{padding:18px}.stack{display:grid;gap:12px}.split{display:grid;gap:12px}.notice{border:1px solid rgba(245,158,11,.25);background:rgba(245,158,11,.08);color:#fcd98b;border-radius:18px;padding:14px;font-size:14px}.code{background:#050506;border:1px solid var(--line);border-radius:18px;padding:14px;overflow:auto}.code code{font-family:var(--mono);font-size:12px;white-space:pre;color:#dfe2ff}.results-grid{display:grid;grid-template-columns:1fr;gap:12px}.result-card{padding:16px;position:relative;overflow:hidden}.result-card:before{content:"";position:absolute;inset:0 0 auto;height:2px;background:linear-gradient(90deg,var(--accent),transparent)}.result-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}.rank{color:var(--muted2);font-family:var(--mono);font-size:12px}.model{font-weight:590;letter-spacing:-.02em;word-break:break-word}.scoreline{display:flex;align-items:flex-end;gap:8px;margin:12px 0}.big{font-size:44px;line-height:.9;letter-spacing:-.06em;font-weight:510;color:var(--text)}.metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.metric{padding:10px;border-radius:14px;background:rgba(255,255,255,.025);box-shadow:none}.metric b{display:block;font-size:14px}.metric span{display:block;font-size:11px;color:var(--muted2)}.controls{display:grid;gap:10px;margin:14px 0}.control{display:grid;gap:6px}.control label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted2);font-weight:590}.control input,.control select{width:100%;min-height:46px;background:rgba(255,255,255,.035);border:1px solid var(--line);border-radius:14px;color:var(--text);padding:0 12px}.tabs{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:5px;border:1px solid var(--line);border-radius:18px;background:rgba(255,255,255,.025)}.tab{min-height:42px;border:0;border-radius:14px;background:transparent;color:var(--muted);cursor:pointer}.tab.active{background:rgba(113,112,255,.16);color:var(--text)}.table-wrap{display:none;margin-top:12px;overflow:auto;border:1px solid var(--line);border-radius:18px}.table-wrap.active{display:block}table{min-width:820px;width:100%;border-collapse:collapse;font-size:13px}th,td{padding:12px;border-bottom:1px solid var(--line2);text-align:left}th{color:var(--muted2);font-size:11px;text-transform:uppercase;letter-spacing:.08em}.good{color:var(--good)}.bad{color:var(--bad)}.warn{color:var(--warn)}.task-groups{display:grid;grid-template-columns:1fr;gap:12px}.task-card{padding:16px}.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}.chip{border:1px solid var(--line);background:rgba(255,255,255,.025);border-radius:999px;padding:7px 10px;color:var(--muted);font-size:12px}.bars{display:grid;gap:10px}.barrow{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center}.barrow label{color:var(--muted);font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.bar{grid-column:1/-1;height:8px;border-radius:999px;background:rgba(255,255,255,.06);overflow:hidden}.bar i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--accent),#10b981)}details{border:1px solid var(--line);border-radius:16px;background:rgba(255,255,255,.025);padding:0}summary{cursor:pointer;padding:14px 15px;font-weight:590}details>div{padding:0 15px 15px;color:var(--muted)}footer{max-width:var(--max);margin:auto;padding:28px 16px 110px;color:var(--muted2);border-top:1px solid var(--line2)}.route{display:none}.route.active{display:block}.mono{font-family:var(--mono)}
    @media(min-width:720px){main{padding:38px 24px 88px}.nav{padding:14px 24px}.navlinks{display:flex}.bottomnav{display:none}.actions{display:flex}.btn{width:auto}.stats{grid-template-columns:repeat(4,1fr)}.split{grid-template-columns:1.05fr .95fr;align-items:start}.results-grid{grid-template-columns:repeat(2,1fr)}.controls{grid-template-columns:1.4fr .8fr .8fr}.task-groups{grid-template-columns:repeat(2,1fr)}.metrics{grid-template-columns:repeat(3,1fr)}.card{padding:24px}.hero{padding-top:58px}}
    @media(min-width:1040px){.results-grid{grid-template-columns:repeat(3,1fr)}.task-groups{grid-template-columns:repeat(3,1fr)}.metrics{grid-template-columns:repeat(4,1fr)}}
  </style>
</head>
<body>
  <header class="topbar"><nav class="nav"><a class="brand" href="#/"><span class="mark"></span><span>HermesBench</span></a><div class="navlinks" id="desktop-nav"></div><a class="github" href="https://github.com/riceharvest/hermesbench">GitHub</a></nav></header>
  <nav class="bottomnav" id="bottom-nav" aria-label="Primary"></nav>
  <main id="app"><p class="muted">Loading HermesBench…</p></main>
  <footer>HermesBench · execution evidence over benchmark theater · public-dev samples are not official rankings.</footer>
  <script src="app.js"></script>
</body>
</html>
