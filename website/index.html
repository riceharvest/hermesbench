<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="description" content="HermesBench is an execution-based benchmark for Hermes-style tool-using agents.">
  <title>HermesBench — execution evidence over benchmark theater</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{
      color-scheme:dark;
      --bg:#06070a;--bg-soft:#090b10;--panel:#0d1017;--panel2:#111622;--panel3:#151b29;
      --card:rgba(255,255,255,.045);--card2:rgba(255,255,255,.07);--glass:rgba(9,12,18,.78);
      --text:#f8fafc;--text2:#d9e1ee;--muted:#97a3b7;--muted2:#677186;
      --line:rgba(255,255,255,.105);--line2:rgba(255,255,255,.06);
      --accent:#7c6dff;--accent2:#2dd4bf;--accent3:#f472b6;--good:#22c55e;--warn:#f59e0b;--bad:#fb4d5f;
      --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;--sans:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
      --max:1240px;--r:26px;--rs:16px;--shadow:0 26px 90px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.06);
    }
    *{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--sans);line-height:1.5;-webkit-font-smoothing:antialiased;overflow-x:hidden}body:before{content:"";position:fixed;inset:0;pointer-events:none;background:radial-gradient(circle at 15% -10%,rgba(124,109,255,.38),transparent 32rem),radial-gradient(circle at 88% 8%,rgba(45,212,191,.20),transparent 28rem),radial-gradient(circle at 52% 48%,rgba(244,114,182,.08),transparent 34rem),linear-gradient(180deg,#070911 0,#050609 76%);z-index:-2}body:after{content:"";position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.032) 1px,transparent 1px);background-size:48px 48px;mask-image:linear-gradient(to bottom,rgba(0,0,0,.55),transparent 72%);z-index:-1}a{color:inherit;text-decoration:none}button,input,select{font:inherit;color:inherit}main{max-width:var(--max);margin:0 auto;padding:30px 18px 118px}.topbar{position:sticky;top:0;z-index:50;background:linear-gradient(180deg,rgba(6,7,10,.88),rgba(6,7,10,.64));backdrop-filter:blur(22px);border-bottom:1px solid var(--line2)}.nav{max-width:var(--max);margin:auto;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:16px}.brand{display:flex;align-items:center;gap:11px;font-weight:800;letter-spacing:-.045em;font-size:17px}.mark{width:36px;height:36px;border-radius:13px;background:conic-gradient(from 220deg,#7c6dff,#2dd4bf,#f472b6,#7c6dff);box-shadow:0 0 36px rgba(124,109,255,.42);position:relative}.mark:after{content:"";position:absolute;inset:9px;border-radius:8px;background:#080a0f}.navlinks{display:none;gap:4px;padding:4px;border:1px solid var(--line2);border-radius:999px;background:rgba(255,255,255,.03)}.navlinks a{color:var(--muted);font-size:13px;font-weight:700;padding:9px 12px;border-radius:999px}.navlinks a.active,.navlinks a:hover{color:var(--text);background:rgba(255,255,255,.075)}.github{min-height:42px;padding:0 14px;border:1px solid var(--line);border-radius:999px;color:var(--text2);display:flex;align-items:center;font-size:13px;font-weight:700;background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.025))}.bottomnav{position:fixed;z-index:60;left:10px;right:10px;bottom:10px;display:grid;grid-template-columns:repeat(5,1fr);gap:4px;padding:6px;border:1px solid var(--line);border-radius:24px;background:rgba(8,10,15,.92);backdrop-filter:blur(22px);box-shadow:var(--shadow)}.bottomnav a{min-height:50px;border-radius:18px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px;font-weight:800}.bottomnav a.active{background:linear-gradient(135deg,rgba(124,109,255,.25),rgba(45,212,191,.11));color:var(--text);box-shadow:inset 0 0 0 1px rgba(124,109,255,.28)}
    .hero{padding:42px 0 28px;display:grid;gap:24px}.hero h1,.section h1{font-size:clamp(44px,9vw,96px);line-height:.92;letter-spacing:-.08em;margin:10px 0 0;max-width:980px}.section h1{font-size:clamp(38px,7vw,76px)}h2{font-size:clamp(24px,4vw,38px);line-height:1;letter-spacing:-.055em;margin:0 0 10px}h3{margin:0 0 8px;letter-spacing:-.03em}.lead{font-size:clamp(17px,2.2vw,22px);line-height:1.55;color:var(--text2);max-width:760px;margin:14px 0 0}.muted,.small{color:var(--muted)}.small{font-size:12px}.eyebrow,.pill,.chip{display:inline-flex;align-items:center;gap:8px;min-height:30px;border:1px solid var(--line);border-radius:999px;padding:5px 10px;color:var(--text2);background:rgba(255,255,255,.045);font-size:12px;font-weight:800;letter-spacing:.01em}.eyebrow{width:max-content;text-transform:uppercase;color:#c7d2fe;background:rgba(124,109,255,.12);border-color:rgba(124,109,255,.26)}.dot{width:8px;height:8px;border-radius:99px;background:var(--accent2);box-shadow:0 0 20px var(--accent2)}.actions{display:grid;gap:10px;margin-top:4px}.btn{min-height:52px;border:1px solid var(--line);border-radius:16px;padding:0 18px;display:inline-flex;align-items:center;justify-content:center;background:rgba(255,255,255,.045);font-weight:800;color:var(--text2)}.btn.primary{background:linear-gradient(135deg,var(--accent),#5eead4);color:#04060a;border-color:transparent;box-shadow:0 16px 50px rgba(124,109,255,.28)}.grid{display:grid;gap:12px}.stats{grid-template-columns:repeat(2,1fr);margin-top:8px}.stat,.metric{border:1px solid var(--line2);border-radius:20px;background:linear-gradient(180deg,rgba(255,255,255,.065),rgba(255,255,255,.025));padding:15px}.stat b{display:block;font-size:30px;line-height:1;letter-spacing:-.06em}.stat span,.metric span{display:block;color:var(--muted);font-size:12px;margin-top:5px}.notice{border:1px solid rgba(245,158,11,.22);background:linear-gradient(135deg,rgba(245,158,11,.12),rgba(124,109,255,.05));color:#fdecc8;border-radius:20px;padding:14px 16px;margin:12px 0}.section{padding:38px 0}.section-head{display:flex;flex-direction:column;align-items:flex-start;gap:8px;margin-bottom:18px}.card,.result-card,.task-card,details,.code{border:1px solid var(--line);border-radius:var(--r);background:linear-gradient(180deg,rgba(255,255,255,.075),rgba(255,255,255,.032));box-shadow:var(--shadow);padding:20px;position:relative;overflow:hidden}.card:before,.result-card:before,.task-card:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 15% 0,rgba(124,109,255,.13),transparent 17rem);pointer-events:none}.result-card{display:flex;flex-direction:column;gap:14px;min-height:100%;transition:transform .18s ease,border-color .18s ease}.result-card:hover{transform:translateY(-3px);border-color:rgba(124,109,255,.32)}.results-grid{display:grid;gap:14px}.result-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.rank{font-family:var(--mono);font-size:11px;text-transform:uppercase;color:var(--muted2);letter-spacing:.08em;font-weight:700}.model{font-size:18px;font-weight:850;letter-spacing:-.04em;line-height:1.15;margin-top:5px;word-break:break-word}.chips{display:flex;gap:6px;flex-wrap:wrap}.chip{min-height:27px;font-size:11px;color:#cbd5e1}.scoreline{display:grid;gap:2px;padding:8px 0}.big{font-size:58px;line-height:.9;letter-spacing:-.08em;font-weight:850;background:linear-gradient(135deg,#fff,#c7d2fe 45%,#5eead4);-webkit-background-clip:text;color:transparent}.metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.result-card .metrics{grid-template-columns:repeat(2,minmax(0,1fr))}.metric{border-radius:16px;box-shadow:none}.metric b{display:block;font-size:14px;letter-spacing:-.02em}.good{color:var(--good)}.bad{color:var(--bad)}.warn{color:var(--warn)}.mono,.code{font-family:var(--mono)}.controls{display:grid;gap:10px;margin:16px 0}.control label{display:block;color:var(--muted);font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;margin:0 0 7px 3px}.control input,.control select{width:100%;min-height:48px;border:1px solid var(--line);border-radius:15px;background:#0a0d13;padding:0 13px;outline:none}.control input:focus,.control select:focus{border-color:rgba(124,109,255,.58);box-shadow:0 0 0 4px rgba(124,109,255,.13)}.tabs{display:flex;gap:8px;margin:8px 0 12px}.tab{min-height:42px;border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.035);padding:0 14px;font-weight:800;cursor:pointer}.tab.active{background:rgba(124,109,255,.18);border-color:rgba(124,109,255,.35)}.table-wrap{display:none;overflow:auto;border:1px solid var(--line);border-radius:20px;background:rgba(0,0,0,.16)}.table-wrap.active{display:block}table{width:100%;border-collapse:collapse;min-width:920px}th,td{text-align:left;padding:14px;border-bottom:1px solid var(--line2);font-size:13px}th{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.08em;background:rgba(255,255,255,.035)}.task-groups{display:grid;gap:14px}.task-card{display:block;min-height:150px}.split{display:grid;gap:16px}.stack{display:grid;gap:12px}.bars{display:grid;gap:12px}.barrow{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;color:var(--muted);font-size:12px}.barrow label{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.bar{grid-column:1/-1;height:9px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden}.bar i{display:block;height:100%;border-radius:inherit;background:linear-gradient(90deg,var(--accent),var(--accent2))}details{padding:0}summary{cursor:pointer;list-style:none;padding:16px 18px;font-weight:800}summary::-webkit-details-marker{display:none}details>div{padding:0 18px 18px}.code{white-space:pre-wrap;font-size:13px;color:#dbeafe;background:linear-gradient(180deg,#090d14,#070910)}footer{max-width:var(--max);margin:0 auto;padding:24px 18px 105px;color:var(--muted2);font-size:12px}.hero .notice,.section>.notice{max-width:900px}
    @media(min-width:760px){main{padding:48px 24px 90px}.nav{padding:15px 24px}.navlinks{display:flex}.bottomnav{display:none}.actions{display:flex}.btn{width:auto}.stats{grid-template-columns:repeat(4,1fr)}.split{grid-template-columns:1.05fr .95fr;align-items:start}.results-grid{grid-template-columns:repeat(2,1fr)}.controls{grid-template-columns:1.4fr .8fr .8fr}.task-groups{grid-template-columns:repeat(2,1fr)}.metrics{grid-template-columns:repeat(3,1fr)}.card{padding:24px}.hero{padding-top:72px}}
    @media(min-width:1080px){.hero{grid-template-columns:minmax(0,1fr) 360px;align-items:end;column-gap:24px}.hero .eyebrow,.hero h1,.hero .lead,.hero .actions,.hero .notice{grid-column:1}.hero .stats{grid-column:2;grid-row:1/6;margin:0;grid-template-columns:repeat(2,minmax(0,1fr));align-self:end}.results-grid{grid-template-columns:repeat(3,minmax(0,1fr))}.task-groups{grid-template-columns:repeat(3,minmax(0,1fr))}.metrics{grid-template-columns:repeat(4,minmax(0,1fr))}.result-card .metrics{grid-template-columns:repeat(2,minmax(0,1fr))}}
  </style>
</head>
<body>
  <header class="topbar"><nav class="nav"><a class="brand" href="#/"><span class="mark"></span><span>HermesBench</span></a><div class="navlinks" id="desktop-nav"></div><a class="github" href="https://github.com/riceharvest/hermesbench">GitHub</a></nav></header>
  <nav class="bottomnav" id="bottom-nav" aria-label="Primary"></nav>
  <main id="app"><p class="muted">Loading HermesBench…</p></main>
  <footer>HermesBench · execution evidence over benchmark theater · public-dev samples are not official rankings.</footer>
  <script src="app.js"></script>
</body>
</html>
