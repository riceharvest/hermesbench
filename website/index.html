<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="description" content="HermesBench checks whether AI agents can finish real tool-using tasks and prove the work.">
  <title>HermesBench — prove the work</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root{
      color-scheme:dark;
      --bg:#121212;--surface:#1e1e1e;--surface2:#242424;--surface3:#2b2b2b;
      --text:#e8eaed;--muted:#bdc1c6;--muted2:#8f9aa3;--line:#3c4043;
      --cyan:#00bcd4;--cyan2:#80deea;--cyanSoft:rgba(0,188,212,.14);--green:#81c995;--red:#f28b82;--amber:#fdd663;
      --shadow:0 8px 24px rgba(0,0,0,.34);--r:12px;--max:900px;--mono:'JetBrains Mono',monospace;--sans:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
    }
    *{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);line-height:1.55;-webkit-font-smoothing:antialiased}body:before{content:"";position:fixed;inset:0;pointer-events:none;background:radial-gradient(circle at 80% -10%,rgba(0,188,212,.18),transparent 360px),linear-gradient(180deg,#121212 0,#101314 100%);z-index:-1}a{color:var(--cyan2);text-decoration:none}button,input,select{font:inherit;color:inherit}main{max-width:var(--max);margin:0 auto;padding:28px 16px 112px}.topbar{position:sticky;top:0;z-index:20;background:rgba(18,18,18,.88);backdrop-filter:blur(18px);border-bottom:1px solid var(--line)}.nav{max-width:var(--max);margin:auto;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}.brand{display:flex;align-items:center;gap:10px;color:var(--text);font-weight:800;letter-spacing:-.04em}.mark{width:34px;height:34px;border-radius:4px;background:linear-gradient(135deg,var(--cyan),#006064);box-shadow:0 0 28px rgba(0,188,212,.3);position:relative}.mark:after{content:"";position:absolute;inset:9px;border-radius:2px;background:var(--bg)}.navlinks{display:none}.navlinks a,.github{min-height:40px;display:inline-flex;align-items:center;border-radius:4px;padding:0 12px;color:var(--muted);font-size:13px;font-weight:700}.navlinks a.active,.navlinks a:hover{background:var(--cyanSoft);color:var(--cyan2)}.github{border:1px solid var(--line);background:var(--surface);color:var(--text)}.bottomnav{position:sticky;z-index:18;top:65px;margin:8px 10px 0;display:grid;grid-template-columns:repeat(5,1fr);gap:4px;padding:6px;border:1px solid var(--line);border-radius:10px;background:rgba(30,30,30,.94);backdrop-filter:blur(18px);box-shadow:var(--shadow)}.bottomnav a{min-height:50px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px;font-weight:800}.bottomnav a.active{background:var(--cyanSoft);color:var(--cyan2)}
    .page-intro{display:flex;flex-direction:column;justify-content:center;padding:34px 0 24px}.kicker,.rank-badge,.chip{display:inline-flex;width:max-content;align-items:center;border:1px solid rgba(0,188,212,.35);border-radius:4px;background:var(--cyanSoft);color:var(--cyan2);font-size:12px;font-weight:800;letter-spacing:.04em;padding:6px 10px;text-transform:uppercase}.page-intro h1{font-size:clamp(42px,14vw,78px);line-height:.96;letter-spacing:-.075em;margin:18px 0 0;max-width:820px}.page-intro p{font-size:clamp(18px,5vw,24px);line-height:1.42;color:var(--muted);margin:18px 0 0;max-width:720px}.focus-card,.result-card,.task-card,details,.metric,.controls{border:1px solid var(--line);border-radius:var(--r);background:var(--surface);box-shadow:var(--shadow)}.focus-card{padding:22px;margin:0 0 16px}.focus-card.primary-focus{background:linear-gradient(180deg,rgba(0,188,212,.16),var(--surface));border-color:rgba(0,188,212,.35)}h2{font-size:clamp(24px,7vw,38px);line-height:1.05;letter-spacing:-.05em;margin:0 0 10px}.focus-card p,.task-card p,.result-card p,.fold-body p{color:var(--muted);margin:8px 0}.btn{min-height:52px;display:inline-flex;align-items:center;justify-content:center;margin-top:14px;border-radius:8px;padding:0 18px;background:var(--surface3);border:1px solid var(--line);font-weight:800;color:var(--text)}.btn.primary{background:var(--cyan);color:#001f24;border-color:transparent}.single-list{display:grid;grid-template-columns:1fr;gap:10px;margin:16px 0}.single-list.compact,.result-numbers{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin:12px 0}.metric{padding:14px;box-shadow:none;background:var(--surface2)}.metric b{display:block;font-size:20px;line-height:1.05;letter-spacing:-.035em;word-break:break-word}.metric span,.metric small{display:block;color:var(--muted);font-size:12px;margin-top:4px}.metric small{color:var(--muted2)}details{margin:12px 0;overflow:hidden}summary{min-height:58px;display:flex;align-items:center;gap:10px;padding:0 16px;cursor:pointer;font-weight:800;list-style:none}summary::-webkit-details-marker{display:none}summary:after{content:"+";margin-left:auto;color:var(--cyan2);font-size:22px}details[open] summary:after{content:"–"}.fold-body{padding:0 16px 16px;color:var(--muted)}.cta-strip{margin:20px 0;padding:16px;border:1px solid rgba(0,188,212,.3);border-radius:8px;background:var(--cyanSoft);display:flex;flex-direction:column;gap:8px}.controls{padding:14px;margin:0 0 16px;display:grid;gap:12px}.controls label{display:grid;gap:6px;color:var(--muted);font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.06em}.controls input,.controls select{width:100%;min-height:48px;border:1px solid var(--line);border-radius:6px;background:#171717;padding:0 12px;outline:none}.controls input:focus,.controls select:focus{border-color:var(--cyan);box-shadow:0 0 0 4px var(--cyanSoft)}.results-grid,.task-groups,.task-breakdown{display:grid;gap:14px}.result-card,.task-card{padding:18px}.rank-row,.card-actions,.chips{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.rank-row{justify-content:space-between;color:var(--muted);font-size:12px;text-transform:uppercase;font-weight:800}.result-card h2,.task-card h2{font-size:22px;letter-spacing:-.045em;margin:12px 0 4px;word-break:break-word}.score-row{display:grid;gap:2px;margin:14px 0}.score-row b{font-size:56px;line-height:.9;letter-spacing:-.07em;color:var(--cyan2)}.score-row span{color:var(--muted);font-weight:700}.card-actions{margin-top:12px}.card-actions a{min-height:40px;border-radius:6px;background:var(--surface3);padding:0 12px;display:inline-flex;align-items:center;font-size:13px;font-weight:800}.task-card b{display:block;color:var(--cyan2);font-size:28px;margin:10px 0 0}.chip{font-size:11px;text-transform:none;letter-spacing:0;background:var(--surface2);border-color:var(--line);color:var(--muted)}pre{white-space:pre-wrap;overflow:auto;border:1px solid var(--line);border-radius:8px;padding:14px;background:#111;font-family:var(--mono);font-size:13px}.status{border-radius:4px;padding:4px 8px;font-size:12px;text-transform:uppercase}.status.ok{background:rgba(129,201,149,.14);color:var(--green)}.status.no{background:rgba(242,139,130,.14);color:var(--red)}.checks{list-style:none;padding:0;margin:12px 0 0;display:grid;gap:8px}.checks li{border:1px solid var(--line);border-radius:6px;background:var(--surface2);padding:10px;font-size:12px;color:var(--muted)}.good{color:var(--green)}.bad{color:var(--red)}footer{max-width:var(--max);margin:0 auto;padding:20px 16px 104px;color:var(--muted2);font-size:12px}
    @media(min-width:720px){main{padding:44px 24px 92px}.nav{padding:14px 24px}.navlinks{display:flex;gap:2px}.bottomnav{display:none}.single-list{grid-template-columns:repeat(2,minmax(0,1fr))}.single-list.compact,.result-numbers{grid-template-columns:repeat(3,minmax(0,1fr))}.results-grid,.task-groups{grid-template-columns:repeat(2,minmax(0,1fr))}.controls{grid-template-columns:1.4fr .8fr .8fr}.cta-strip{flex-direction:row;justify-content:space-between;align-items:center}.page-intro{min-height:50vh}.focus-card,.result-card,.task-card{padding:24px}}
  </style>
</head>
<body>
  <header class="topbar"><nav class="nav"><a class="brand" href="#/"><span class="mark"></span><span>HermesBench</span></a><div class="navlinks" id="desktop-nav"></div><a class="github" href="https://github.com/riceharvest/hermesbench">GitHub</a></nav></header>
  <nav class="bottomnav" id="bottom-nav" aria-label="Primary"></nav>
  <main id="app"><p>Loading HermesBench…</p></main>
  <footer>HermesBench · checks real work, not confident claims · public sample runs are not official rankings.</footer>
  <script src="app.js"></script>
</body>
</html>
